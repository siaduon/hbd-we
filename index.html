<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>

    <style>
        :root {
            --pink-cerah: #ff69b4;
            --kuning-cerah: #ffd700;
            --biru-muda: #87ceeb;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, var(--biru-muda), #f0f8ff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h1 {
            color: var(--pink-cerah);
        }

        .foto-frame {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 5px solid var(--kuning-cerah);
            border-radius: 50%;
            overflow: hidden;
        }

        .foto-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: var(--pink-cerah);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
        }

        #pesan {
            display: none;
            margin-top: 20px;
            animation: fadeIn 1s;
        }

        .bunga {
            position: fixed;
            top: -10%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Selamat Ulang Tahun! 🎂</h1>

    <div class="foto-frame">
        <img src="image.png">
    </div>

    <button class="btn" onclick="tampilkanKejutan()">Buka Kejutan ✨</button>
    <button class="btn" onclick="toggleMusic(this)">🎵 Play Music</button>

    <div id="pesan">
        <h3>Semangat untukmu, calon dokter hebat! 🩺✨</h3>
        <p>Teruslah belajar dengan tekun dan penuh semangat.</p>
        <p>Semoga sukses selalu dalam dunia kedokteran.</p>
        <p><strong>- Andre -</strong></p>
    </div>

    <audio id="bg-music" loop>
        <source src="hbd.mp3" type="audio/mpeg">
    </audio>
    <br><br>
<a href="https://wa.me/6285173434052?text=%20aku%20sudah%20lihat%20kejutan%20ulang%20tahunnya%20🎂✨" target="_blank">
    <button class="btn-kejutan">💬 Kirim Pesan </button>
</a>
</div>

<script>
const music = document.getElementById("bg-music");

function tampilkanKejutan() {
    const pesan = document.getElementById('pesan');
    pesan.style.display = 'block';

    document.querySelector('.btn').innerText = 'Yay! ❤️';

    // auto play musik saat klik (allowed by browser)
    music.play();

    for (let i = 0; i < 15; i++) createBunga();
}

function toggleMusic(btn) {
    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause Music";
    } else {
        music.pause();
        btn.innerText = "🎵 Play Music";
    }
}

function createBunga() {
    const bunga = document.createElement('div');
    bunga.classList.add('bunga');

    const emojis = ['🌸','✨','🎈','💖'];
    bunga.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    bunga.style.left = Math.random() * 100 + "vw";
    bunga.style.fontSize = (Math.random() * 20 + 10) + "px";
    bunga.style.animationDuration = (Math.random() * 5 + 3) + "s";

    document.body.appendChild(bunga);

    setTimeout(() => bunga.remove(), 8000);
}

setInterval(createBunga, 500);
</script>

</body>
</html>
